<!-- Task 21.1: Validation Modal -->
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
    <!-- Modal Header -->
    <div class="flex justify-between items-center p-6 border-b border-gray-200">
      <h2 class="text-2xl font-bold text-gray-800">Validate Evidence</h2>
      <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600">
        <span class="material-icons">close</span>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="p-6" *ngIf="evidence">
      <!-- Evidence Details -->
      <div class="mb-6 p-4 bg-gray-50 rounded-lg">
        <h3 class="font-bold text-lg text-gray-800 mb-2">{{ evidence.title }}</h3>
        <p class="text-sm text-gray-600 mb-2" *ngIf="evidence.description">{{ evidence.description }}</p>
        <div class="flex items-center text-sm text-gray-500">
          <span class="material-icons text-sm mr-1">person</span>
          <span>{{ evidence.learnerName }} ({{ evidence.learnerEmail }})</span>
        </div>
        <div class="flex items-center text-sm text-gray-500 mt-1">
          <span class="material-icons text-sm mr-1">category</span>
          <span>{{ evidence.category }}</span>
        </div>
      </div>

      <!-- Validation Error -->
      <div *ngIf="validationError" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
        {{ validationError }}
      </div>

      <!-- Task 21.2: Score Slider -->
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Score (0-100)
        </label>
        <div class="flex items-center space-x-4">
          <input 
            type="range" 
            [(ngModel)]="score" 
            min="0" 
            max="100" 
            class="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer slider">
          <span class="text-2xl font-bold text-primary w-16 text-center">{{ score }}</span>
        </div>
        <div class="flex justify-between text-xs text-gray-500 mt-1">
          <span>0</span>
          <span>50</span>
          <span>100</span>
        </div>
      </div>

      <!-- Task 21.2: Admin Comment Textarea -->
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">
          Comment
          <span class="text-red-500" *ngIf="defaultAction === 'reject'">*</span>
        </label>
        <textarea 
          [(ngModel)]="adminComment" 
          rows="4"
          maxlength="2000"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
          placeholder="Provide feedback to the learner..."></textarea>
        <div class="text-xs text-gray-500 mt-1 text-right">
          {{ adminComment.length }}/2000 characters
        </div>
      </div>

      <!-- Task 21.3: Action Buttons -->
      <div class="flex space-x-3 pt-4 border-t border-gray-200">
        <button 
          type="button"
          (click)="closeModal()"
          [disabled]="loading"
          class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          Cancel
        </button>
        <button 
          type="button"
          (click)="reject()"
          [disabled]="loading"
          class="flex-1 bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center space-x-2">
          <span class="material-icons text-sm">cancel</span>
          <span *ngIf="!loading">Reject</span>
          <span *ngIf="loading">Processing...</span>
        </button>
        <button 
          type="button"
          (click)="approve()"
          [disabled]="loading"
          class="flex-1 bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center space-x-2">
          <span class="material-icons text-sm">check_circle</span>
          <span *ngIf="!loading">Approve</span>
          <span *ngIf="loading">Processing...</span>
        </button>
      </div>
    </div>
  </div>
</div>
