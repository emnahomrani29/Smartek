<!-- Animated Page Header -->
<app-page-header
  title="Planning"
  subtitle="Gérez votre emploi du temps et vos sessions de formation"
  icon="📅"
  gradient="from-blue-600 via-indigo-600 to-purple-600"
  [showStats]="true"
  [stats]="getPlanningStats()">
</app-page-header>

<div class="container mx-auto px-4 py-8">
  <div class="bg-white rounded-xl shadow-lg p-8">
    <div class="text-center py-12">
      <svg class="w-24 h-24 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <h3 class="text-2xl font-bold text-gray-800 mb-2">Planning</h3>
      <p class="text-gray-600">Fonctionnalité en cours de développement</p>
    </div>
  </div>
</div>
