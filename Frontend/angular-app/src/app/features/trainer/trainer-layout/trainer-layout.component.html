<div class="min-h-screen bg-gradient-to-br from-gray-50 via-green-50 to-emerald-50">
  <!-- Top Navigation Bar -->
  <nav class="bg-white shadow-md sticky top-0 z-40">
    <div class="container mx-auto px-6 py-4">
      <div class="flex items-center justify-between">
        <!-- Logo & Brand -->
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-gradient-to-br from-green-600 to-emerald-600 rounded-xl flex items-center justify-center shadow-lg">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
          </div>
          <div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-green-600 to-emerald-600 bg-clip-text text-transparent">
              Espace Formateur
            </h1>
            <p class="text-sm text-gray-500">Bienvenue, {{ userName }}</p>
          </div>
        </div>

        <!-- Navigation Links -->
        <div class="flex items-center gap-2">
          <!-- Academic Dropdown Menu -->
          <div class="relative">
            <button 
              (click)="toggleAcademicMenu()"
              [class.bg-gradient-to-r]="isAcademicMenuOpen"
              [class.from-green-600]="isAcademicMenuOpen"
              [class.to-emerald-600]="isAcademicMenuOpen"
              [class.text-white]="isAcademicMenuOpen"
              [class.shadow-lg]="isAcademicMenuOpen"
              class="flex items-center gap-2 px-6 py-3 rounded-xl text-gray-700 hover:bg-gray-100 transition-all duration-300 group">
              <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
              </svg>
              <span class="font-semibold">Académique</span>
              <svg 
                class="w-4 h-4 transition-transform duration-300"
                [class.rotate-180]="isAcademicMenuOpen"
                fill="none" 
                stroke="currentColor" 
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>

            <!-- Dropdown Menu -->
            <div 
              *ngIf="isAcademicMenuOpen"
              class="absolute top-full mt-2 left-0 w-56 bg-white rounded-xl shadow-2xl border border-gray-200 overflow-hidden z-50 animate-dropdown">
              <a 
                routerLink="/trainer/courses" 
                (click)="closeAcademicMenu()"
                routerLinkActive="bg-green-50 text-green-600"
                class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-50 transition-colors group">
                <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
                <span class="font-medium">Cours</span>
              </a>
              
              <a 
                routerLink="/trainer/training-management" 
                (click)="closeAcademicMenu()"
                routerLinkActive="bg-green-50 text-green-600"
                class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-50 transition-colors group">
                <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                </svg>
                <span class="font-medium">Formations</span>
              </a>
              
              <a 
                routerLink="/trainer/exams" 
                (click)="closeAcademicMenu()"
                routerLinkActive="bg-green-50 text-green-600"
                class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-50 transition-colors group">
                <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
                </svg>
                <span class="font-medium">Examens</span>
              </a>
              
              <a 
                routerLink="/trainer/learner-analytics" 
                (click)="closeAcademicMenu()"
                routerLinkActive="bg-green-50 text-green-600"
                class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-50 transition-colors group">
                <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                <span class="font-medium">Learner Analytics</span>
              </a>
            </div>
          </div>
          
          <a 
            routerLink="/trainer/skill-evidence" 
            routerLinkActive="bg-gradient-to-r from-green-600 to-emerald-600 text-white shadow-lg"
            [routerLinkActiveOptions]="{exact: false}"
            class="flex items-center gap-2 px-6 py-3 rounded-xl text-gray-700 hover:bg-gray-100 transition-all duration-300 group">
            <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
            </svg>
            <span class="font-semibold">Compétences</span>
          </a>
          
          <a 
            routerLink="/trainer/badge-management" 
            routerLinkActive="bg-gradient-to-r from-green-600 to-emerald-600 text-white shadow-lg"
            [routerLinkActiveOptions]="{exact: false}"
            class="flex items-center gap-2 px-6 py-3 rounded-xl text-gray-700 hover:bg-gray-100 transition-all duration-300 group">
            <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
            </svg>
            <span class="font-semibold">Badges</span>
          </a>

          <!-- Logout Button -->
          <button 
            (click)="logout()"
            class="ml-4 flex items-center gap-2 px-6 py-3 rounded-xl bg-red-50 text-red-600 hover:bg-red-100 transition-all duration-300 group">
            <svg class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
            <span class="font-semibold">Déconnexion</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <main class="container mx-auto px-6 py-8">
    <router-outlet></router-outlet>
  </main>
</div>
