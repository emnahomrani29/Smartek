<div class="flex items-center justify-between border-t border-gray-200 bg-white px-4 py-3 sm:px-6 rounded-b-lg">
  <!-- Mobile View -->
  <div class="flex flex-1 justify-between sm:hidden">
    <button
      (click)="previousPage()"
      [disabled]="pageInfo.page === 0"
      class="relative inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
      Previous
    </button>
    <button
      (click)="nextPage()"
      [disabled]="pageInfo.page >= pageInfo.totalPages - 1"
      class="relative ml-3 inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
      Next
    </button>
  </div>

  <!-- Desktop View -->
  <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
    <div class="flex items-center gap-4">
      <p class="text-sm text-gray-700">
        Showing
        <span class="font-medium">{{ startItem }}</span>
        to
        <span class="font-medium">{{ endItem }}</span>
        of
        <span class="font-medium">{{ pageInfo.totalElements }}</span>
        results
      </p>
      
      <div class="flex items-center gap-2">
        <label for="pageSize" class="text-sm text-gray-700">Per page:</label>
        <select
          id="pageSize"
          [(ngModel)]="pageInfo.size"
          (ngModelChange)="onPageSizeChange($event)"
          class="rounded-md border-gray-300 py-1 pl-2 pr-8 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
          <option *ngFor="let option of pageSizeOptions" [value]="option">{{ option }}</option>
        </select>
      </div>
    </div>

    <nav class="isolate inline-flex -space-x-px rounded-md shadow-sm" aria-label="Pagination">
      <!-- Previous Button -->
      <button
        (click)="previousPage()"
        [disabled]="pageInfo.page === 0"
        class="relative inline-flex items-center rounded-l-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 disabled:opacity-50 disabled:cursor-not-allowed">
        <span class="sr-only">Previous</span>
        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z" clip-rule="evenodd" />
        </svg>
      </button>

      <!-- Page Numbers -->
      <ng-container *ngFor="let page of visiblePages">
        <button
          *ngIf="page === -1"
          disabled
          class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-700 ring-1 ring-inset ring-gray-300 focus:outline-offset-0 cursor-default">
          ...
        </button>
        <button
          *ngIf="page !== -1"
          (click)="goToPage(page)"
          [class.bg-blue-600]="page === pageInfo.page"
          [class.text-white]="page === pageInfo.page"
          [class.text-gray-900]="page !== pageInfo.page"
          [class.hover:bg-gray-50]="page !== pageInfo.page"
          class="relative inline-flex items-center px-4 py-2 text-sm font-semibold ring-1 ring-inset ring-gray-300 focus:z-20 focus:outline-offset-0 transition-colors">
          {{ page + 1 }}
        </button>
      </ng-container>

      <!-- Next Button -->
      <button
        (click)="nextPage()"
        [disabled]="pageInfo.page >= pageInfo.totalPages - 1"
        class="relative inline-flex items-center rounded-r-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 disabled:opacity-50 disabled:cursor-not-allowed">
        <span class="sr-only">Next</span>
        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd" />
        </svg>
      </button>
    </nav>
  </div>
</div>
